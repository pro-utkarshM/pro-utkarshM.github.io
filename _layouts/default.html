<!doctype html>
<html>
  {% include head.html %}
  
  <title>
    {% if page.title == "Home" %}
      {{ site.data.settings.title }}
    {% else %}
      {{ page.title }} | {{ site.data.settings.title }}
    {% endif %}
  </title>

  <body>
    <div class="container">
      {% include header.html %}
      <div class="content-container">
        {{ content }}
      </div>
      {% include footer.html %}
    </div>
  </body>
</html>
